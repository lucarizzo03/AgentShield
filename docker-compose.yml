services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_URL: redis://redis:6379/0
      TEMPO_USE_CLI: "true"
      TEMPO_FALLBACK_ON_BLOCK: "true"
      TEMPO_REQUEST_JSON: '{"prompt":"a sunset over the ocean"}'
    volumes:
      - ${HOME}/.tempo:/root/.tempo
    ports:
      - "8000:8000"
    restart: unless-stopped
